<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <title>Workout Tracker – Pläne</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .plan-actions {
      display: flex;
      gap: 6px;
    }

    .inline-edit-input {
      background: var(--bg-primary);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 0.95rem;
      padding: 4px 8px;
      outline: none;
      font-weight: 700;
    }

    .session-collapsible {
      display: none;
    }

    .session-collapsible.open {
      display: block;
    }

    .collapse-icon {
      transition: transform 0.2s;
    }

    .session-editor-header.open .collapse-icon {
      transform: rotate(90deg);
    }

    .add-session-btn {
      width: 100%;
      border: 2px dashed var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      padding: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      margin-top: 6px;
    }

    .add-session-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .add-plan-card {
      border: 2px dashed var(--border);
      background: transparent;
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
      margin-bottom: 12px;
    }

    .add-plan-card:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .reps-input-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .reps-input {
      width: 52px;
      text-align: center;
      padding: 8px 4px;
    }

    .catalog-section {
      margin-top: 24px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .catalog-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      background: var(--bg-card);
      user-select: none;
    }

    .catalog-section-header:hover {
      background: var(--bg-elevated);
    }

    .catalog-section-title {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .catalog-toggle-icon {
      color: var(--text-muted);
      transition: transform 0.2s;
    }

    .catalog-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .catalog-row:last-child {
      border-bottom: none;
    }

    .catalog-row-editing {
      display: block;
      padding: 10px 12px;
    }

    .catalog-row-info {
      flex: 1;
      min-width: 0;
    }

    .catalog-row-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1>Pläne</h1>
    </header>

    <main class="page-content">
      <div id="plans-container">
        <div class="loading">
          <div class="spinner"></div>
          <span>Lade Pläne...</span>
        </div>
      </div>

      <!-- Exercise Catalog Editor -->
      <div class="catalog-section" id="catalog-section">
        <div class="catalog-section-header" onclick="toggleCatalog()" id="catalog-toggle-btn" aria-expanded="false">
          <span class="catalog-section-title">Übungskatalog bearbeiten</span>
          <svg class="catalog-toggle-icon" id="catalog-toggle-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </div>
        <div id="catalog-body" style="display:none; background:var(--bg-card);">
          <div id="catalog-list"></div>
        </div>
      </div>

      <div class="catalog-section" id="crossfit-catalog-section">
        <div class="catalog-section-header" onclick="toggleCrossfitCatalog()" id="crossfit-catalog-toggle-btn" aria-expanded="false">
          <span class="catalog-section-title">CrossFit-Übungen verwalten</span>
          <svg class="catalog-toggle-icon" id="crossfit-catalog-toggle-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </div>
        <div id="crossfit-catalog-body" style="display:none; background:var(--bg-card);">
          <div style="padding:10px 12px; border-bottom:1px solid var(--border);">
            <button class="btn btn-outline btn-sm btn-full" onclick="addCrossfitExercise()">+ Neue CrossFit-Übung</button>
          </div>
          <div id="crossfit-catalog-list"></div>
        </div>
      </div>
    </main>

    <div id="nav-placeholder"></div>
  </div>

  <!-- Exercise Library Modal -->
  <div class="modal-overlay" id="exercise-library-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Übung hinzufügen</h2>
        <button class="modal-close" onclick="closeExerciseLibrary()">×</button>
      </div>
      <div class="form-group">
        <input type="text" class="form-control" id="exercise-search" placeholder="Suchen nach Name oder Muskel..." oninput="filterExercises()">
      </div>

      <!-- Create new exercise -->
      <div style="margin-bottom: 10px;">
        <button class="btn btn-outline btn-sm btn-full" id="new-ex-toggle-btn" onclick="toggleNewExerciseForm()">
          + Neue Übung erstellen
        </button>
        <div id="new-exercise-form" style="display:none; margin-top:8px; padding:12px; background:var(--bg-elevated); border-radius:10px; border:1px solid var(--accent);">
          <div class="form-group">
            <label class="form-label">Name *</label>
            <input type="text" class="form-control" id="new-ex-name" placeholder="z.B. Bizeps Curl mit KH">
          </div>
          <div class="form-group">
            <label class="form-label">Muskelgruppen</label>
            <input type="text" class="form-control" id="new-ex-muscles" placeholder="z.B. Bizeps, Unterarm">
          </div>
          <div class="form-group" style="margin-bottom:8px;">
            <label class="form-label">Technik-Hinweis</label>
            <textarea class="form-control" id="new-ex-technique" rows="2" placeholder="Kurze Beschreibung der korrekten Ausführung..." style="resize:vertical;"></textarea>
          </div>
          <div style="display:flex; gap:8px;">
            <button class="btn btn-primary btn-sm" onclick="createAndAddExercise()">Erstellen & hinzufügen</button>
            <button class="btn btn-outline btn-sm" onclick="toggleNewExerciseForm()">Abbrechen</button>
          </div>
        </div>
      </div>

      <div id="exercise-library-list" style="max-height: 40vh; overflow-y: auto;"></div>
    </div>
  </div>

  <!-- GIF Picker Modal -->
  <div class="modal-overlay" id="gif-picker-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">GIF zuordnen</h2>
        <button class="modal-close" onclick="closeGifPicker()">×</button>
      </div>
      <p id="gif-picker-context" style="font-size:0.82rem; color:var(--text-muted); margin-bottom:10px;"></p>
      <div class="form-group" style="margin-bottom:8px;">
        <input type="text" class="form-control" id="gif-search" placeholder="Englischen Namen suchen (z.B. bench press)…" oninput="filterGifList()">
      </div>
      <div id="gif-preview-selected" style="display:none; text-align:center; margin-bottom:10px; padding:8px; background:var(--bg-elevated); border-radius:8px; border:1px solid var(--accent);">
        <img id="gif-preview-img" style="max-height:140px; object-fit:contain; border-radius:6px;">
        <div id="gif-preview-name" style="font-size:0.78rem; color:var(--text-muted); margin-top:4px;"></div>
      </div>
      <div id="gif-picker-list" style="max-height:36vh; overflow-y:auto; border:1px solid var(--border); border-radius:8px; margin-bottom:12px;"></div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-primary" id="gif-picker-confirm" onclick="confirmGifSelection()" style="flex:1;" disabled>Übernehmen</button>
        <button class="btn btn-outline" onclick="clearGifSelection()">GIF entfernen</button>
        <button class="btn btn-ghost" onclick="closeGifPicker()">Abbrechen</button>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/plans.js"></script>
</body>
</html>
