<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <title>Körper & Ernährung</title>
  <link rel="stylesheet" href="/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .body-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .nutri-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:4px; }
    .nutri-box {
      background:var(--bg-elevated); border-radius:var(--radius-sm);
      padding:10px 12px; text-align:center;
    }
    .nutri-box .val { font-size:1.25rem; font-weight:800; color:var(--accent); }
    .nutri-box .lbl { font-size:0.68rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.04em; margin-top:2px; }
    .zone-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; font-size:0.8rem; }
    .zone-color { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
    .metric-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:8px 4px; border-bottom:1px solid var(--border); font-size:0.85rem;
    }
    .metric-row:last-child { border-bottom:none; }
    .goal-btn {
      flex:1; padding:9px 4px; border-radius:var(--radius-sm); border:2px solid var(--border);
      background:var(--bg-elevated); color:var(--text-secondary); font-size:0.78rem;
      font-weight:600; cursor:pointer; text-align:center; -webkit-tap-highlight-color:transparent;
    }
    .goal-btn.active { border-color:var(--accent); background:rgba(96,165,250,0.1); color:var(--accent); }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <button class="btn btn-ghost btn-sm" onclick="window.location.href='/dashboard.html'">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <h1>Körper & Ernährung</h1>
      <div style="width:40px;"></div>
    </header>

    <main class="page-content">

      <!-- Quick weight entry -->
      <div class="card">
        <div class="card-title">Gewicht eintragen</div>
        <div style="display:flex; gap:8px; align-items:center;">
          <input type="number" class="form-control" id="new-weight" placeholder="z.B. 82.5" min="20" max="300" step="0.1" style="flex:1; font-size:1.1rem; text-align:center;">
          <span class="text-muted">kg</span>
          <button class="btn btn-primary" onclick="addWeight()" style="padding:10px 18px;">Speichern</button>
        </div>
        <div style="margin-top:10px;">
          <button class="btn btn-ghost btn-sm" onclick="toggleMeasurements()" id="measure-toggle" style="padding:4px 0; color:var(--text-muted);">+ Umfänge erfassen (optional)</button>
          <div id="measure-fields" style="display:none; margin-top:8px;">
            <div class="body-grid-2">
              <div><label class="form-label" style="font-size:0.75rem;">Taille (cm)</label><input type="number" class="form-control" id="new-waist" step="0.5" min="40" max="200"></div>
              <div><label class="form-label" style="font-size:0.75rem;">Brust (cm)</label><input type="number" class="form-control" id="new-chest" step="0.5" min="50" max="200"></div>
            </div>
            <div style="margin-top:8px; width:calc(50% - 5px);">
              <label class="form-label" style="font-size:0.75rem;">Oberarm (cm)</label><input type="number" class="form-control" id="new-arm" step="0.5" min="15" max="70">
            </div>
          </div>
        </div>
      </div>

      <!-- Weight chart -->
      <div class="card" id="weight-chart-card" style="margin-top:12px; display:none;">
        <div class="card-title">Gewichtsverlauf</div>
        <div style="position:relative; height:200px;"><canvas id="weight-chart"></canvas></div>
        <div id="metric-list" style="margin-top:10px;"></div>
      </div>

      <!-- Nutrition -->
      <div class="card" style="margin-top:12px;" id="nutrition-card">
        <div class="card-title">Ernährung</div>
        <div id="nutrition-incomplete" style="font-size:0.85rem; color:var(--text-muted);">
          Fülle dein Profil unten aus und trage dein Gewicht ein — dann berechnet
          die App deinen Kalorien- und Proteinbedarf.
        </div>
        <div id="nutrition-content" style="display:none;">
          <div style="display:flex; gap:8px; margin-bottom:12px;">
            <button class="goal-btn" data-goal="cut" onclick="setGoal('cut')">📉 Definition<br><small>−400 kcal</small></button>
            <button class="goal-btn" data-goal="maintain" onclick="setGoal('maintain')">⚖️ Halten<br><small>±0 kcal</small></button>
            <button class="goal-btn" data-goal="bulk" onclick="setGoal('bulk')">📈 Aufbau<br><small>+300 kcal</small></button>
          </div>
          <div class="nutri-grid">
            <div class="nutri-box"><div class="val" id="nutri-kcal">–</div><div class="lbl">kcal / Tag</div></div>
            <div class="nutri-box"><div class="val" id="nutri-protein">–</div><div class="lbl">Protein / Tag</div></div>
            <div class="nutri-box"><div class="val" id="nutri-tdee">–</div><div class="lbl">Verbrauch (TDEE)</div></div>
            <div class="nutri-box"><div class="val" id="nutri-water">–</div><div class="lbl">Wasser / Tag</div></div>
          </div>
          <div id="nutri-detail" style="font-size:0.75rem; color:var(--text-muted); margin-top:10px; line-height:1.5;"></div>
        </div>
      </div>

      <!-- Heart rate zones -->
      <div class="card" style="margin-top:12px; display:none;" id="hr-card">
        <div class="card-title">Herzfrequenz-Zonen <span style="font-weight:400; font-size:0.7rem; color:var(--text-muted);">(220 − Alter)</span></div>
        <div id="hr-zones"></div>
      </div>

      <!-- Profile -->
      <div class="card" style="margin-top:12px;">
        <div class="card-title">Profil</div>
        <div class="body-grid-2">
          <div>
            <label class="form-label" style="font-size:0.75rem;">Größe (cm)</label>
            <input type="number" class="form-control" id="profile-height" min="100" max="250" onchange="saveProfile()">
          </div>
          <div>
            <label class="form-label" style="font-size:0.75rem;">Geburtsjahr</label>
            <input type="number" class="form-control" id="profile-birthyear" min="1920" max="2020" onchange="saveProfile()">
          </div>
        </div>
        <div class="body-grid-2" style="margin-top:10px;">
          <div>
            <label class="form-label" style="font-size:0.75rem;">Geschlecht</label>
            <select class="form-control" id="profile-sex" onchange="saveProfile()">
              <option value="">–</option>
              <option value="m">männlich</option>
              <option value="w">weiblich</option>
            </select>
          </div>
          <div>
            <label class="form-label" style="font-size:0.75rem;">Beruf / Alltag</label>
            <select class="form-control" id="profile-job" onchange="saveProfile()">
              <option value="">–</option>
              <option value="sitzend">Sitzend (Büro, Schule)</option>
              <option value="stehend">Stehend / gehend</option>
              <option value="koerperlich">Körperlich aktiv</option>
              <option value="schwer">Schwere körperl. Arbeit</option>
            </select>
          </div>
        </div>
        <div style="margin-top:10px;">
          <label class="form-label" style="font-size:0.75rem;">Weiterer Sport außerhalb der App (min/Woche, optional)</label>
          <input type="number" class="form-control" id="profile-extra-sport" min="0" max="2000" step="15" placeholder="z.B. 90 (Fußball, Radfahren …)" onchange="saveProfile()">
        </div>
        <div id="training-time-info" style="font-size:0.75rem; color:var(--text-muted); margin-top:10px; display:none;"></div>
      </div>

    </main>

    <div id="nav-placeholder"></div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/body.js"></script>
</body>
</html>
