<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <title>Workout Tracker – Training</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    body { overflow-x: hidden; }

    .training-page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--bg-primary);
    }

    .training-main {
      flex: 1;
      padding: 12px 16px 80px;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }

    .set-log-row {
      display: flex;
      gap: 6px;
      margin-bottom: 4px;
      align-items: center;
    }

    .set-log-num {
      width: 28px;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 600;
      flex-shrink: 0;
    }

    .set-log-detail {
      flex: 1;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .recommendation-hint {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 4px;
    }

    .recommendation-hint strong {
      color: var(--accent);
    }

    /* Upcoming exercises */
    #upcoming-exercises {
      margin-top: 10px;
    }

    .upcoming-header {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding: 6px 0 4px;
    }

    .upcoming-exercise-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      background: var(--bg-card);
      border-radius: 8px;
      margin-bottom: 4px;
      border: 1px solid var(--border);
      opacity: 0.65;
    }

    .upcoming-num {
      font-size: 0.75rem;
      color: var(--text-muted);
      width: 18px;
      flex-shrink: 0;
    }

    .upcoming-name {
      flex: 1;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .upcoming-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* Quick edit form */
    .exercise-edit-card {
      background: var(--bg-elevated);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .exercise-edit-card .form-group {
      margin-bottom: 10px;
    }

    .exercise-edit-card .form-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 4px;
      display: block;
    }

    .exercise-edit-card .form-control {
      font-size: 0.95rem;
    }

    .stepper-sm .stepper-btn {
      width: 36px;
      height: 36px;
      font-size: 1.1rem;
    }

    .stepper-sm .stepper-value {
      min-width: 48px;
      font-size: 1.1rem;
    }

    /* Rating / feedback in rest overlay */
    .rest-feedback { width:100%; max-width:300px; margin-bottom:16px; text-align:center; }
    .feedback-label { font-size:0.8rem; color:var(--text-muted); margin-bottom:8px; }
    .feedback-emojis { display:flex; gap:16px; justify-content:center; }
    .emoji-btn { font-size:2rem; background:none; border:3px solid transparent; border-radius:50%; width:56px; height:56px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; }
    .emoji-btn.selected { border-color:var(--accent); background:rgba(233,69,96,0.15); transform:scale(1.1); }
    .emoji-btn:active { transform:scale(0.95); }

    /* Set bubble rating colors */
    .set-bubble.rating-1 { background:#ef4444 !important; }
    .set-bubble.rating-2 { background:#4ade80 !important; }
    .set-bubble.rating-3 { background:#60a5fa !important; }
    .set-bubble.skipped { background:var(--bg-elevated) !important; color:var(--text-muted) !important; text-decoration:line-through; }
  </style>
</head>
<body>
  <div class="training-page">
    <!-- Training Header -->
    <div class="training-header" id="training-header">
      <div class="training-meta">
        <div class="training-title" id="training-title">Training</div>
        <div class="session-timer">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span id="session-timer">00:00</span>
          <!-- Minimized rest timer badge -->
          <div id="rest-mini" style="display:none; align-items:center; gap:4px; background:var(--accent); border-radius:20px; padding:2px 10px; cursor:pointer; font-size:0.85rem; font-weight:700;" onclick="restoreRestTimer()">
            ⏸ <span id="rest-mini-display">--</span>
          </div>
        </div>
      </div>
      <div class="progress-track" id="progress-track"></div>
    </div>

    <!-- Main Training Area -->
    <div class="training-main" id="training-main">
      <div class="loading" id="loading-state">
        <div class="spinner"></div>
        <span>Lade Training...</span>
      </div>

      <!-- Completed exercises (above current) -->
      <div id="completed-exercises"></div>

      <!-- Current Exercise Card -->
      <div class="exercise-card hidden" id="current-exercise-card">
        <div class="exercise-name-row">
          <h2 class="exercise-title" id="exercise-name">Übungsname</h2>
          <button class="exercise-info-btn" onclick="openExerciseEdit()" title="Übung bearbeiten" id="exercise-edit-btn" style="margin-right:2px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536M9 13l6.586-6.586a2 2 0 112.828 2.828L11.828 15.828a2 2 0 01-1.414.586H9v-2.414a2 2 0 01.586-1.414z"/>
            </svg>
          </button>
          <button class="exercise-info-btn" id="exercise-info-btn" title="Übungsinfo">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="8" stroke-width="2.5"/>
              <line x1="12" y1="12" x2="12" y2="16"/>
            </svg>
          </button>
        </div>
        <!-- Quick edit form (hidden by default) -->
        <div id="exercise-edit-form" style="display:none;"></div>
        <p class="exercise-meta" id="exercise-meta"></p>

        <!-- Sets bubbles -->
        <div class="sets-grid" id="sets-grid"></div>

        <!-- Logged sets -->
        <div id="logged-sets-list" style="margin-bottom: 12px;"></div>

        <!-- Recommendation hint -->
        <div class="recommendation-hint" id="recommendation-hint" style="display:none;"></div>

        <!-- Weight + Reps controls -->
        <div class="weight-reps-row">
          <div class="control-group">
            <div class="control-label">Gewicht</div>
            <div class="stepper">
              <button class="stepper-btn" onclick="adjustWeight(-2.5)">−</button>
              <div class="stepper-value">
                <input type="number" id="weight-display" value="0" min="0" step="2.5"
                  style="background:transparent;border:none;border-bottom:1px solid var(--border);color:inherit;font-size:1.4rem;font-weight:700;width:70px;text-align:center;outline:none;"
                  onchange="setWeightFromInput()" oninput="setWeightFromInput()"> kg
              </div>
              <button class="stepper-btn" onclick="adjustWeight(2.5)">+</button>
            </div>
          </div>
          <div class="control-group">
            <div class="control-label">Wdh.</div>
            <div class="stepper">
              <button class="stepper-btn" onclick="adjustReps(-1)">−</button>
              <div class="stepper-value"><span id="reps-display">8</span></div>
              <button class="stepper-btn" onclick="adjustReps(1)">+</button>
            </div>
          </div>
        </div>

        <!-- Log Set + Skip buttons -->
        <div style="display:flex; gap:8px; margin-top:12px;">
          <button class="log-set-btn" id="log-set-btn" onclick="logSet()" style="flex:3;">Satz speichern</button>
          <button class="btn btn-secondary" id="skip-set-btn" onclick="skipSet()" style="flex:1; border-radius:12px;">Überspringen</button>
        </div>
      </div>

      <!-- Upcoming exercises -->
      <div id="upcoming-exercises" style="display:none;"></div>

      <!-- End Training Button -->
      <div class="end-training-area" id="end-training-area" style="display:none;">
        <button class="btn btn-danger btn-full btn-lg" onclick="endTraining()">
          Training beenden
        </button>
        <p class="text-center text-muted mt-2" style="font-size:0.8rem;">Alle Übungen abgeschlossen!</p>
      </div>

      <!-- Active end button (always visible) -->
      <div style="padding: 8px 0 16px; text-align: center;" id="abort-area">
        <button class="btn btn-outline btn-sm" onclick="confirmEndTraining()">
          Training abbrechen / beenden
        </button>
      </div>
    </div>
  </div>

  <!-- Rest Timer Overlay -->
  <div class="rest-timer-overlay hidden" id="rest-timer-overlay">
    <!-- Header with minimize button -->
    <div style="display:flex; justify-content:space-between; align-items:center; width:100%; max-width:320px; margin-bottom:8px;">
      <div class="rest-timer-label">Pause</div>
      <button onclick="minimizeRestTimer()" style="background:none;border:none;color:var(--text-muted);font-size:1.2rem;cursor:pointer;" title="Minimieren">⬇</button>
    </div>

    <div class="rest-timer-ring" id="timer-ring">
      <svg viewBox="0 0 200 200">
        <circle class="rest-timer-ring-bg" cx="100" cy="100" r="88"/>
        <circle class="rest-timer-ring-progress" id="ring-progress" cx="100" cy="100" r="88"
          stroke-dasharray="553"
          stroke-dashoffset="0"/>
      </svg>
      <div class="rest-timer-ring-text" id="timer-display">60</div>
    </div>

    <!-- Duration adjustment -->
    <div class="rest-duration-controls">
      <button class="rest-duration-btn" onclick="adjustRestDuration(-10)">−10s</button>
      <div class="rest-duration-label">
        <div id="rest-total-label" style="font-weight:700;">60s</div>
        <div style="font-size:0.7rem;color:var(--text-muted);">Pausenzeit</div>
      </div>
      <button class="rest-duration-btn" onclick="adjustRestDuration(10)">+10s</button>
    </div>

    <!-- Set feedback: rating + note -->
    <div class="rest-feedback" id="rest-feedback">
      <div class="feedback-label">Wie war der Satz?</div>
      <div class="feedback-emojis">
        <button class="emoji-btn" id="rating-1" onclick="selectRating(1)" title="Zu schwer / nicht geschafft">😤</button>
        <button class="emoji-btn" id="rating-2" onclick="selectRating(2)" title="Geschafft">✅</button>
        <button class="emoji-btn" id="rating-3" onclick="selectRating(3)" title="Zu leicht">💪</button>
      </div>
      <textarea id="set-note" placeholder="Notiz zum Satz... (optional)" rows="2"
        style="width:100%; background:var(--bg-card); border:1px solid var(--border); border-radius:8px; color:var(--text-primary); padding:8px; font-size:0.85rem; resize:none; margin-top:8px;"></textarea>
    </div>

    <!-- Controls -->
    <div class="rest-timer-controls">
      <button class="btn btn-secondary" onclick="skipRest()">Überspringen</button>
      <button class="btn btn-primary" id="rest-toggle-btn" onclick="toggleRestTimer()">Pause</button>
    </div>

    <!-- Next exercise info -->
    <div class="next-exercise-info" id="next-exercise-info" style="display:none;">
      <div class="label">Nächste Übung</div>
      <div class="name" id="next-exercise-name"></div>
    </div>
  </div>

  <!-- Training Done Overlay -->
  <div class="rest-timer-overlay hidden" id="training-done-overlay">
    <div style="text-align:center; max-width: 320px;">
      <div style="font-size:4rem; margin-bottom:16px;">🏆</div>
      <h2 style="font-size:1.8rem; margin-bottom:8px;">Training abgeschlossen!</h2>
      <p class="text-secondary" id="done-summary" style="margin-bottom:24px;"></p>
      <div style="display:flex; flex-direction:column; gap:10px;">
        <button class="btn btn-primary btn-lg" onclick="window.location.href='/history.html'">Verlauf anzeigen</button>
        <button class="btn btn-secondary" onclick="window.location.href='/dashboard.html'">Zurück zum Start</button>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/training.js"></script>
</body>
</html>
