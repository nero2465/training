<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <title>Cardio</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .cardio-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:6px; margin-bottom:12px; }
    .activity-btn {
      padding:10px 4px; border-radius:var(--radius-sm); border:2px solid var(--border);
      background:var(--bg-elevated); color:var(--text-secondary);
      font-size:0.68rem; cursor:pointer; text-align:center; line-height:1.5;
      -webkit-tap-highlight-color:transparent;
    }
    .activity-btn .em { font-size:1.3rem; display:block; }
    .activity-btn.active { border-color:var(--accent); background:rgba(96,165,250,0.1); color:var(--accent); }

    .cardio-entry {
      display:flex; align-items:center; gap:10px; padding:9px 12px;
      background:var(--bg-elevated); border:1px solid var(--border);
      border-radius:var(--radius-sm); margin-bottom:6px; font-size:0.88rem;
    }
    .week-summary {
      display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:4px;
    }
    .week-box { background:var(--bg-elevated); border-radius:var(--radius-sm); padding:10px; text-align:center; }
    .week-box .val { font-size:1.2rem; font-weight:800; color:var(--accent); }
    .week-box .lbl { font-size:0.65rem; color:var(--text-muted); text-transform:uppercase; margin-top:2px; }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <button class="btn btn-ghost btn-sm" onclick="window.location.href='/dashboard.html'">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <h1>Cardio</h1>
      <div style="width:40px;"></div>
    </header>

    <main class="page-content">

      <div class="card">
        <div class="card-title">Einheit erfassen</div>
        <div class="cardio-grid" id="activity-grid"></div>
        <div style="display:flex; gap:8px;">
          <div style="flex:1;">
            <label class="form-label" style="font-size:0.75rem;">Dauer (min)</label>
            <input type="number" class="form-control" id="cardio-duration" min="1" max="600" placeholder="30" style="text-align:center;">
          </div>
          <div style="flex:1;">
            <label class="form-label" style="font-size:0.75rem;">Distanz (km, optional)</label>
            <input type="number" class="form-control" id="cardio-distance" min="0" step="0.1" placeholder="–" style="text-align:center;">
          </div>
        </div>
        <div style="margin-top:8px;">
          <input type="text" class="form-control" id="cardio-note" placeholder="Notiz (optional, z.B. Stufe 8)" style="font-size:0.85rem;">
        </div>
        <button class="btn btn-primary btn-full" style="margin-top:12px; padding:12px;" onclick="addCardio()">Speichern</button>
        <div id="hr-hint" style="display:none; font-size:0.75rem; color:var(--text-muted); margin-top:10px; text-align:center;"></div>
      </div>

      <div class="card" style="margin-top:12px;">
        <div class="card-title">Diese Woche</div>
        <div class="week-summary">
          <div class="week-box"><div class="val" id="week-sessions">0</div><div class="lbl">Einheiten</div></div>
          <div class="week-box"><div class="val" id="week-minutes">0</div><div class="lbl">Minuten</div></div>
          <div class="week-box"><div class="val" id="week-km">–</div><div class="lbl">Kilometer</div></div>
        </div>
      </div>

      <div class="card" style="margin-top:12px;" id="cardio-list-card">
        <div class="card-title">Letzte Einheiten</div>
        <div id="cardio-list"><p class="text-muted" style="font-size:0.85rem;">Noch keine Einträge.</p></div>
      </div>

    </main>

    <div id="nav-placeholder"></div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/cardio.js"></script>
</body>
</html>
