<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <title>Workout Tracker – Verlauf</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    /* ── Volume calendar ─────────────────────────────── */
    .cal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .cal-title { font-weight: 700; font-size: 0.95rem; }
    .cal-nav-btn {
      width: 34px; height: 34px; border: 1px solid var(--border);
      background: var(--bg-elevated); color: var(--text-primary);
      border-radius: var(--radius-sm); cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
    }
    .cal-dow {
      text-align: center; font-size: 0.62rem; color: var(--text-muted);
      text-transform: uppercase; padding: 2px 0;
    }
    .cal-day {
      aspect-ratio: 1; border-radius: 6px; background: var(--bg-elevated);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 0.72rem; color: var(--text-muted); position: relative;
      border: 1px solid transparent;
    }
    .cal-day.empty { background: transparent; }
    .cal-day.today { border-color: var(--accent); }
    .cal-day.has-workout {
      background: rgba(96,165,250,0.14); cursor: pointer; color: var(--text-primary);
    }
    .cal-day.has-workout:active { background: rgba(96,165,250,0.28); }
    .cal-day.deload-day { background: rgba(74,222,128,0.12); }
    .cal-day-num { font-weight: 600; line-height: 1.1; }
    .cal-day-vol {
      font-size: 0.56rem; color: var(--accent); font-weight: 700;
      line-height: 1.1; margin-top: 1px; white-space: nowrap;
    }
    .cal-day.deload-day .cal-day-vol { color: var(--success, #4ade80); }
    .cal-summary {
      font-size: 0.75rem; color: var(--text-muted); text-align: center; margin-top: 8px;
    }

    /* ── Set editing in detail view ──────────────────── */
    .set-edit-input {
      width: 54px; padding: 3px 4px; text-align: center;
      background: var(--bg-primary); color: var(--text-primary);
      border: 1px solid var(--accent); border-radius: 4px; font-size: 0.85rem;
    }
    .set-row-editable { cursor: pointer; }
    .set-row-editable:active { background: var(--bg-elevated); }
    .set-edit-hint { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1>Verlauf</h1>
    </header>

    <main class="page-content">
      <!-- Volume calendar -->
      <div class="card" id="calendar-card" style="margin-bottom:14px;">
        <div class="cal-header">
          <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
          <div class="cal-title" id="cal-title">Monat</div>
          <button class="cal-nav-btn" onclick="calNav(1)">›</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="cal-summary" id="cal-summary"></div>
      </div>

      <div id="history-container">
        <div class="loading">
          <div class="spinner"></div>
          <span>Lade Verlauf...</span>
        </div>
      </div>

      <div id="empty-history" class="empty-state hidden">
        <div class="icon">📋</div>
        <h3>Noch keine Trainings</h3>
        <p>Absolviere dein erstes Training, um es hier zu sehen.</p>
        <a href="/dashboard.html" class="btn btn-primary">Training starten</a>
      </div>
    </main>

    <div id="nav-placeholder"></div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/history.js"></script>
</body>
</html>
